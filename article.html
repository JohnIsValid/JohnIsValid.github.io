<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="周瀚翔的文章阅读页。" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/controller.svg"

    <link rel="stylesheet" href="styles.css?v=article-reader-1" />
  </head>
  <body class="article-reader-page">
    <header class="article-reader-header">
      <a class="article-reader-brand" href="index.html#articles">
