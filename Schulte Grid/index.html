<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5efe5" />
    <title>顺序挑战</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="setup-screen" id="setupScreen" aria-labelledby="setupTitle">
      <div class="setup-card">
        <p class="eyebrow">NUMBER SPRINT</p>
        <h2 id="setupTitle">选择棋盘</h2>
        <p class="setup-intro">棋盘越大，越考验你的眼力和专注力。</p>
        <section class="training-benefits" aria-labelledby="benefitsTitle">
          <h3 id="benefitsTitle">舒尔特网格训练的好处</h3>
          <div class="benefit-list">
            <div class="benefit-item">
              <span aria-hidden="true">01</span>
              <strong>拓展视野</strong>
              <p>练习用余光快速捕捉整个棋盘的信息。</p>
            </div>
            <div class="benefit-item">
              <span aria-hidden="true">02</span>
              <strong>集中注意</strong>
              <p>在干扰中持续寻找下一个目标数字。</p>
            </div>
            <div class="benefit-item">
              <span aria-hidden="true">03</span>
              <strong>提升反应</strong>
              <p>缩短观察、判断到点击之间的时间。</p>
            </div>
          </div>
          <p class="benefit-note">每天短时、规律练习，比一次练很久更重要。</p>
        </section>
        <div class="size-options" aria-label="棋盘尺寸">
          <button type="button" data-size="4"><strong>4 × 4</strong><span>16 个数字</span></button>
          <button type="button" data-size="5"><strong>5 × 5</strong><span>25 个数字</span></button>
          <button type="button" data-size="6"><strong>6 × 6</strong><span>36 个数字</span></button>
          <button type="button" data-size="7"><strong>7 × 7</strong><span>49 个数字</span></button>
        </div>
      </div>
    </section>

    <main class="game-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">NUMBER SPRINT</p>
          <h1 id="gameTitle">顺序 25</h1>
          <p class="subtitle" id="gameSubtitle">从 1 开始，按顺序点到 25。</p>
        </div>
        <div class="header-actions">
          <button class="restart-button" id="changeSizeButton" type="button">选择棋盘</button>
          <button class="restart-button" id="restartButton" type="button" aria-label="重新开始游戏">
            <span aria-hidden="true">↻</span>重新开始
          </button>
        </div>
      </header>

      <section class="status-panel" aria-label="游戏状态">
        <div class="status-item">
          <span class="status-label">下一个</span>
          <strong class="next-number" id="nextNumber">1</strong>
        </div>
        <div class="status-divider" aria-hidden="true"></div>
        <div class="status-item timer-item">
          <span class="status-label">用时</span>
          <strong class="timer" id="timer">00:00.00</strong>
        </div>
      </section>

      <p class="hint" id="hint" role="status" aria-live="polite">点击数字 1，计时开始</p>

      <section class="board-wrap">
        <div class="board" id="board" aria-label="数字游戏棋盘"></div>
        <div class="completion-card" id="completionCard" aria-hidden="true">
          <div class="completion-icon" aria-hidden="true">✓</div>
          <p>挑战完成</p>
          <strong id="finalTime">00:00.00</strong>
          <div class="rating-badge" id="ratingBadge">优秀</div>
          <span class="rating-note" id="ratingNote"></span>
          <p class="rating-guide" id="ratingGuide"></p>
          <button id="playAgainButton" type="button">再玩一次</button>
        </div>
      </section>

      <footer>
        <span>1</span>
        <div class="progress-track" aria-hidden="true"><div id="progressBar"></div></div>
        <span id="maxNumber">25</span>
      </footer>
    </main>

    <script src="game.js"></script>
  </body>
</html>
